# Randomizer config for The Battle Cats

[general]
# ENTER RANDOMIZATION SEED BELOW (if not, a random one will be chosen)
seed = 0


################# GAMEPLAY CHANGES #################

[gameplay]
remove_metals = true                    # literally removes metals from the game, recommended
give_metals_new_trait = true            # gives ex metals a trait
use_metal_rework = true                 # uses my ex metal rebalance
remove_behemoths = true
use_behemoth_rebalance = true           # uses my ex behemoth rebalance
preserve_old_zombies = true             # swaps zkiller and witch so old zombies can still burrow (makes sorting cats weird)
preserve_alien_magnifications = true    # buffs old aliens in itf and cotc to make them not piss easy
remove_itf_crystals = false             # removes itf crystals from the game (if false no new aliens can be in itf to make it not stupid)
remove_cotc_crystals = true             # removes cotc crystals from the game, recommended who likes these

[gameplay.unit_reworks]
