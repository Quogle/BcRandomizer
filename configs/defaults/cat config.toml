################# CAT UNIT RANDOMIZATION #################

[unit]
id_swap = false                      # swaps cat ids with devastating consequences
randomize_abilities = false
gift_trait_specific_abilities = true    # for instance, cats that gain zombie target have zkiller frequency chance to gain zkill
take_trait_specific_abilities = true    # for instance, cats that lose zombie target have zkiller frequency chance to lose zkill
zkiller_frequency = 80
curse_imm_frequency = 100               # what % of new relic targetters gain curse imm
shield_pierce_frequency = 20            # what % of new aku targetting units gain shield pierce

[unit.traits]
# Trait randomization mode
# "none"      : traits are unchanged
# "swap"      : traits are globally swapped (ex: red -> black)
# "randomize" : each unit gets a completely random trait
mode = "randomize"

#swap setting
specified_swap = [
        ["red","white"]
    ]

#randomize setting
trait_per_whole_unit = true         # floating goes to black for all of a units forms
try_new_trait = true                # attempts to get only new traits

[unit.talents]
edit_talents = true
hp_attack_included = true
traits_included = true
only_unique_talents = false
give_all_units_talents = true




